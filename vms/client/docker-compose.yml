version: "3"

services:
  temp1:
    image: sheflervaleriia/sensor-sim
    environment:
      - SIM_HOST=mosquitto
      - SIM_NAME=temp1
      - SIM_PERIOD=2
      - SIM_TYPE=temperature
    networks:
      - iot-net

  temp2:
    image: sheflervaleriia/sensor-sim
    environment:
      - SIM_HOST=mosquitto
      - SIM_NAME=temp2
      - SIM_PERIOD=3
      - SIM_TYPE=temperature
    networks:
      - iot-net

  pressure1:
    image: sheflervaleriia/sensor-sim
    environment:
      - SIM_HOST=mosquitto
      - SIM_NAME=pressure1
      - SIM_PERIOD=4
      - SIM_TYPE=pressure
    networks:
      - iot-net

  pressure2:
    image: sheflervaleriia/sensor-sim
    environment:
      - SIM_HOST=mosquitto
      - SIM_NAME=pressure2
      - SIM_PERIOD=5
      - SIM_TYPE=pressure
    networks:
      - iot-net

  current1:
    image: sheflervaleriia/sensor-sim
    environment:
      - SIM_HOST=mosquitto
      - SIM_NAME=current1
      - SIM_PERIOD=1
      - SIM_TYPE=current
    networks:
      - iot-net

  humidity1:
    image: sheflervaleriia/sensor-sim
    environment:
      - SIM_HOST=mosquitto
      - SIM_NAME=humidity1
      - SIM_PERIOD=3
      - SIM_TYPE=humidity
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge