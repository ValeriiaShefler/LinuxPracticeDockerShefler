version: "3"

services:
  temp1:
    image: ${DOCKERHUB_USERNAME}/sensor-simulator:latest
    environment:
      - SIM_HOST=${MQTT_BROKER_HOST}
      - SIM_PORT=${MQTT_BROKER_PORT}
      - SIM_NAME=temp1
      - SIM_PERIOD=2
      - SIM_TYPE=temperature

  temp2:
    image: ${DOCKERHUB_USERNAME}/sensor-simulator:latest
    environment:
      - SIM_HOST=${MQTT_BROKER_HOST}
      - SIM_PORT=${MQTT_BROKER_PORT}
      - SIM_NAME=temp2
      - SIM_PERIOD=3
      - SIM_TYPE=temperature

  pressure1:
    image: ${DOCKERHUB_USERNAME}/sensor-simulator:latest
    environment:
      - SIM_HOST=${MQTT_BROKER_HOST}
      - SIM_PORT=${MQTT_BROKER_PORT}
      - SIM_NAME=pressure1
      - SIM_PERIOD=4
      - SIM_TYPE=pressure

  pressure2:
    image: ${DOCKERHUB_USERNAME}/sensor-simulator:latest
    environment:
      - SIM_HOST=${MQTT_BROKER_HOST}
      - SIM_PORT=${MQTT_BROKER_PORT}
      - SIM_NAME=pressure2
      - SIM_PERIOD=5
      - SIM_TYPE=pressure

  current1:
    image: ${DOCKERHUB_USERNAME}/sensor-simulator:latest
    environment:
      - SIM_HOST=${MQTT_BROKER_HOST}
      - SIM_PORT=${MQTT_BROKER_PORT}
      - SIM_NAME=current1
      - SIM_PERIOD=1
      - SIM_TYPE=current

  humidity1:
    image: ${DOCKERHUB_USERNAME}/sensor-simulator:latest
    environment:
      - SIM_HOST=${MQTT_BROKER_HOST}
      - SIM_PORT=${MQTT_BROKER_PORT}
      - SIM_NAME=humidity1
      - SIM_PERIOD=3
      - SIM_TYPE=humidity